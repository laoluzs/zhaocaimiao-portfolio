name: 网站质量检查

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: 构建与测试
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: 安装依赖
        run: npm ci
      - name: 代码检查
        run: npm run lint
      - name: 构建与自动测试
        run: npm test